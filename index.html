<title>動物占い | 家族まるごと60キャラクター診断</title>
<style>

  .body{padding:24px 22px 30px}

  .people{display:flex;flex-direction:column;gap:14px}
  .person{background:#fffaf6;border:1px solid var(--line);border-radius:18px;padding:14px 14px 16px;position:relative}
  .person .row1{display:flex;gap:10px;align-items:center;margin-bottom:10px}
  .person .idx{width:26px;height:26px;flex:none;border-radius:50%;background:var(--accent);color:#fff;

    color:var(--accent);font-size:14px;font-weight:800;cursor:pointer}
  .add:hover{background:#fff0e8}
  .btn{width:100%;margin-top:16px;padding:16px;border:none;border-radius:16px;font-size:16px;font-weight:800;
    color:#fff;cursor:pointer;letter-spacing:.06em;background:linear-gradient(135deg,var(--accent),var(--accent2));
    box-shadow:0 10px 22px rgba(255,122,89,.38);transition:transform .12s,box-shadow .12s}
  .btn:active{transform:translateY(2px);box-shadow:0 5px 12px rgba(255,122,89,.34)}
  .err{color:#d9534f;font-size:13px;margin-top:12px;text-align:center;display:none}

  #results{margin-top:26px;display:none}
  #results.show{display:block;animation:pop .5s ease}
  @keyframes pop{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

  .rcard .emoji{font-size:42px;line-height:1;filter:drop-shadow(0 3px 5px rgba(0,0,0,.18))}
  .rcard .meta{flex:1;min-width:0}

  .rcard .cname{font-size:17px;font-weight:900;line-height:1.3;margin-top:2px}
  .rcard .sub{font-size:12px;opacity:.95;margin-top:4px;display:flex;flex-wrap:wrap;gap:6px}

  .rcard .chev{flex:none;opacity:.85;font-size:13px;transition:transform .2s}
  .rcard.open .chev{transform:rotate(180deg)}
  .rcard .detail{background:#fffaf6;padding:0 16px;max-height:0;overflow:hidden;transition:max-height .28s ease,padding .28s ease}

// ===== 日付 → キャラナンバー(1-60) =====
function toJDN(y,m,d){const a=Math.floor((14-m)/12),y2=y+4800-a,m2=m+12*a-3;return d+Math.floor((153*m2+2)/5)+365*y2+Math.floor(y2/4)-Math.floor(y2/100)+Math.floor(y2/400)-32045;}
function charNo(y,m,d){return (((toJDN(y,m,d)+49)%60)+60)%60+1;}

// ===== 保存（クッキー。file://等でクッキー不可のときはlocalStorageで代替）=====
const CK="doubutsu_family";
function saveCookie(list){
  const v=encodeURIComponent(JSON.stringify(list));
  try{document.cookie=CK+"="+v+";max-age="+(60*60*24*365)+";path=/;samesite=lax";}catch(e){}
  try{localStorage.setItem(CK,JSON.stringify(list));}catch(e){}
}
function loadCookie(){
  const m=document.cookie.match(/(?:^|; )doubutsu_family=([^;]*)/);
  if(m){try{return JSON.parse(decodeURIComponent(m[1]));}catch(e){}}
  try{const s=localStorage.getItem(CK); if(s) return JSON.parse(s);}catch(e){}
  return null;
}

// ===== 人の入力行 =====
const NOW=new Date().getFullYear();
const peopleEl=document.getElementById('people');

function makePerson(data){
  data=data||{};
  const el=document.createElement('div');
  el.className='person';
  el.innerHTML=`
    <div class="row1">
      <div class="idx"></div>
      <input type="text" class="pname-in" placeholder="名前（任意）" maxlength="20">
      <button class="rm" title="削除">×</button>
    </div>
    <div class="date-row">
      <select class="y"></select><select class="m"></select><select class="d"></select>
    </div>`;
  const yS=el.querySelector('.y'),mS=el.querySelector('.m'),dS=el.querySelector('.d');
  for(let y=NOW;y>=1919;y--) yS.add(new Option(y+'年',y));
  for(let m=1;m<=12;m++) mS.add(new Option(m+'月',m));
  function fillDays(keepVal){
    const last=new Date(+yS.value,+mS.value,0).getDate();
    dS.innerHTML='';
    for(let d=1;d<=last;d++) dS.add(new Option(d+'日',d));
    if(keepVal&&keepVal<=last) dS.value=keepVal;
  }
  yS.value=data.y||1990; mS.value=data.m||1; fillDays(data.d||1);
  yS.onchange=()=>fillDays(+dS.value); mS.onchange=()=>fillDays(+dS.value);
  if(data.name) el.querySelector('.pname-in').value=data.name;
  el.querySelector('.rm').onclick=()=>{
    if(peopleEl.children.length<=1) return; // 最低1人
    el.remove(); renumber();
  };
  peopleEl.appendChild(el);
  renumber();
}
function renumber(){
  [...peopleEl.children].forEach((el,i)=>{ el.querySelector('.idx').textContent=i+1; });
}
function readPeople(){
  return [...peopleEl.children].map(el=>({
    name:el.querySelector('.pname-in').value.trim(),
    y:+el.querySelector('.y').value, m:+el.querySelector('.m').value, d:+el.querySelector('.d').value
  }));
}

// 初期化：クッキーがあれば復元、なければ1人
const saved=loadCookie();
if(saved&&saved.length){ saved.forEach(makePerson); } else { makePerson(); }

document.getElementById('add').onclick=()=>{ makePerson(); peopleEl.lastChild.scrollIntoView({behavior:'smooth',block:'center'}); };

// ===== 占う =====

  const people=readPeople();
  const err=document.getElementById('err');
  if(people.some(p=>!(p.y&&p.m&&p.d))){err.style.display='block';return;}
  err.style.display='none';
  saveCookie(people); // 最後の入力を記憶

  const rc=document.getElementById('rcards');
  rc.innerHTML='';
  people.forEach((p,i)=>{
    const no=charNo(p.y,p.m,p.d), row=C[no-1];
    const name=row[1], animal=row[2], summary=row[3], a=A[animal], g=G[a.g];
    const who=p.name||('メンバー'+(i+1));
    const card=document.createElement('div');
    card.className='rcard';
    card.innerHTML=`
      <div class="top" style="background:linear-gradient(135deg,${g.c1},${g.c2})">
        <div class="emoji">${a.e}</div>
        <div class="meta">
          <div class="pname">${esc(who)}（${p.y}/${p.m}/${p.d}）</div>
          <div class="cname">${name}</div>
          <div class="sub"><span class="pill">キャラNo.${no}</span><span class="pill">${animal} ${a.e}</span><span class="pill">${g.emoji}${g.name.replace('グループ','')}</span></div>
        </div>
        <div class="chev">▾</div>
      </div>
      <div class="detail">
        <div class="lbl">キャラクター</div><p>${summary}</p>
        <div class="lbl">${g.emoji} ${g.name}の傾向</div><p>${g.desc}</p>
        <div class="lbl">キーワード</div><p>${a.k.map(k=>'#'+k).join('　')}</p>
      </div>`;
    card.querySelector('.top').onclick=()=>card.classList.toggle('open');
    rc.appendChild(card);
  });
  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
};
function esc(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

document.getElementById('again').onclick=()=>{
  document.getElementById('results').classList.remove('show');
  window.scrollTo({top:0,behavior:'smooth'});
};
</script>
</body>
</html>
