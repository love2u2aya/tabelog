</head>
<body>
<div class="wrap">

 {n:'甲（きのえ）',s:'木・大樹',d:'まっすぐで向上心が強く、面倒見のよいリーダー気質。曲がったことが嫌いで、コツコツ上へ伸びていく大樹のような人。'},
 {n:'乙（きのと）',s:'木・草花',d:'柔軟で協調性があり、しなやかに環境へ適応する粘り強さの持ち主。周囲と和みながら着実に伸びる人。'},
 {n:'丙（ひのえ）',s:'火・太陽',d:'明るく情熱的で、その場を照らすムードメーカー。裏表がなく行動力にあふれ、みんなを元気づける太陽のような存在。'},
 {n:'丁（ひのと）',s:'火・灯火',d:'繊細で気配り上手、内側に熱い情熱を秘めた努力家。人の心にそっと寄り添う灯火のような優しさを持つ。'},
 {n:'戊（つちのえ）',s:'土・山',d:'どっしり安定感があり、面倒見がよく信頼される大黒柱タイプ。動じない包容力で周囲を支える山のような人。'},
 {n:'己（つちのと）',s:'土・田畑',d:'献身的で世話好き、コツコツ育てる堅実さの持ち主。人を育て支えることに喜びを感じる田畑のような人。'},
 {n:'庚（かのえ）',s:'金・鋼',d:'意志が強く決断力抜群、正義感にあふれる行動派。曲がらない芯の強さと勝負強さを持つ鋼のような人。'},
 {n:'辛（かのと）',s:'金・宝石',d:'美意識が高く繊細で、こだわりとプライドを持つ人。磨くほど輝く、宝石のような感性の持ち主。'},
 {n:'壬（みずのえ）',s:'水・大海',d:'スケールが大きく自由で、柔軟な発想の持ち主。とらわれず流れていく大海のような度量とバイタリティ。'},
 {n:'癸（みずのと）',s:'水・雨露',d:'知的で感受性が豊か、コツコツ潤す縁の下の力持ち。細やかな気づきで周囲を潤す雨露のような人。'},
];
const TG={'比肩':'自立・マイペース','劫財':'社交・行動力','食神':'表現・楽しむ才','傷官':'感性・完璧主義','偏財':'商才・人脈','正財':'堅実・誠実','偏官':'闘志・勝負強さ','正官':'責任感・規律','偏印':'ひらめき・多才','印綬':'知性・思いやり'};
function tenGod(De,Dy,Oe,Oy){
  const same=(Dy===Oy);
  if(Oe===De) return same?'比肩':'劫財';
  if(Oe===(De+1)%5) return same?'食神':'傷官';
  if(Oe===(De+2)%5) return same?'偏財':'正財';
  if(Oe===(De+3)%5) return same?'偏官':'正官';
  return same?'偏印':'印綬';
}
function solarLong(jd){
  const T=(jd-2451545)/36525;
  const L0=280.46646+36000.76983*T+0.0003032*T*T;
  const M=357.52911+35999.05029*T-0.0001537*T*T, Mr=M*Math.PI/180;
  const Cc=(1.914602-0.004817*T-0.000014*T*T)*Math.sin(Mr)+(0.019993-0.000101*T)*Math.sin(2*Mr)+0.000289*Math.sin(3*Mr);
  const om=125.04-1934.136*T;
  let l=L0+Cc-0.00569-0.00478*Math.sin(om*Math.PI/180);
  return ((l%360)+360)%360;
}
function bazi(y,m,d){
  const lam=solarLong(toJDN(y,m,d)-0.375); // 12:00 JST
  const mb=Math.floor(((((lam-315)%360)+360)%360)/30); // 0=寅
  const monthOrder=mb+1;
  let py=y; if(m<=2 && lam<315) py=y-1;
  const ysi=((py-4)%10+10)%10, ybi=((py-4)%12+12)%12;
  const tiger=(2+2*(ysi%5))%10;
  const msi=(tiger+(monthOrder-1))%10;
  const mbi=(monthOrder+1)%12;
  const dg=(((toJDN(y,m,d)+49)%60)+60)%60; // 0=甲子
  const dsi=dg%10, dbi=dg%12;
  return {py, ysi,ybi, msi,mbi, dsi,dbi,
    year:STEMS[ysi]+BR[ybi], month:STEMS[msi]+BR[mbi], day:STEMS[dsi]+BR[dbi],
    stems:[ysi,msi,dsi], branches:[ybi,mbi,dbi]};
}
function gogyoCount(b){
  const c=[0,0,0,0,0];
  b.stems.forEach(s=>c[stemElem(s)]++);
  b.branches.forEach(br=>c[brElem[br]]++);
  return c;
}
// 相性
const HE=[[0,1],[2,11],[3,10],[4,9],[5,8],[6,7]];   // 支合
const CHONG=[[0,6],[1,7],[2,8],[3,9],[4,10],[5,11]]; // 冲
const pairHas=(l,a,b)=>l.some(p=>(p[0]===a&&p[1]===b)||(p[0]===b&&p[1]===a));
function compat(ba,bb){
  const ea=stemElem(ba.dsi), eb=stemElem(bb.dsi);
  const na=ba.dbi, nb=bb.dbi;
  let s=0; const notes=[];
  if(ea===eb){s+=1;notes.push('日主が同じ五行（'+GNAME[ea]+'）で価値観が似ています。');}
  else if(ea===(eb+1)%5||eb===(ea+1)%5){s+=2;notes.push('日主の五行が相生（'+GNAME[ea]+'と'+GNAME[eb]+'）。自然に助け合える良い関係です。');}
  else if(ea===(eb+2)%5||eb===(ea+2)%5){s-=1;notes.push('日主の五行が相剋（'+GNAME[ea]+'と'+GNAME[eb]+'）。刺激的ですが衝突にも注意。');}
  else{notes.push('日主の五行はほどよい距離感（'+GNAME[ea]+'と'+GNAME[eb]+'）です。');}
  if(pairHas(HE,na,nb)){s+=2;notes.push('日支が支合（'+BR[na]+BR[nb]+'）で惹かれ合う相性。');}
  else if(pairHas(CHONG,na,nb)){s-=2;notes.push('日支が冲（'+BR[na]+BR[nb]+'）でぶつかりやすい面も。');}
  const label=s>=3?'◎ 相性抜群':s>=1?'○ 良い相性':s===0?'△ ふつう':'▲ 要歩み寄り';
  const col=s>=3?'#2f8f63':s>=1?'#4caf7d':s===0?'#b0902f':'#c96a4f';
  return {label,col,note:notes.join('')};
}

/* =========================================================
   共通：人の入力
   ========================================================= */
const NOW=new Date().getFullYear();
const peopleEl=document.getElementById('people');
function makePerson(data){
  data=data||{};
  const el=document.createElement('div');
  el.className='person';
  el.innerHTML=`
    <div class="row1">
      <div class="idx"></div>
      <input type="text" class="pname-in" placeholder="名前（任意）" maxlength="20">
      <button class="rm" title="削除">×</button>
    </div>
    <div class="date-row"><select class="y"></select><select class="m"></select><select class="d"></select></div>`;
  const yS=el.querySelector('.y'),mS=el.querySelector('.m'),dS=el.querySelector('.d');
  for(let y=NOW;y>=1919;y--) yS.add(new Option(y+'年',y));
  for(let mo=1;mo<=12;mo++) mS.add(new Option(mo+'月',mo));
  function fillDays(keep){const last=new Date(+yS.value,+mS.value,0).getDate();dS.innerHTML='';for(let d=1;d<=last;d++)dS.add(new Option(d+'日',d));if(keep&&keep<=last)dS.value=keep;}
  yS.value=data.y||1990; mS.value=data.m||1; fillDays(data.d||1);
  yS.onchange=()=>fillDays(+dS.value); mS.onchange=()=>fillDays(+dS.value);
  if(data.name) el.querySelector('.pname-in').value=data.name;
  el.querySelector('.rm').onclick=()=>{ if(peopleEl.children.length<=1)return; el.remove(); renumber(); };
  peopleEl.appendChild(el); renumber();
}
function renumber(){[...peopleEl.children].forEach((el,i)=>el.querySelector('.idx').textContent=i+1);}
function readPeople(){return [...peopleEl.children].map(el=>({name:el.querySelector('.pname-in').value.trim(),y:+el.querySelector('.y').value,m:+el.querySelector('.m').value,d:+el.querySelector('.d').value}));}
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

/* =========================================================
   保存（クッキー＋localStorageフォールバック）
   ========================================================= */
const CK="doubutsu_family";
function save(state){
  const v=encodeURIComponent(JSON.stringify(state));
  try{document.cookie=CK+"="+v+";max-age="+(60*60*24*365)+";path=/;samesite=lax";}catch(e){}
  try{localStorage.setItem(CK,JSON.stringify(state));}catch(e){}
}
function load(){
  let raw=null;
  const m=document.cookie.match(/(?:^|; )doubutsu_family=([^;]*)/);
  if(m){try{raw=JSON.parse(decodeURIComponent(m[1]));}catch(e){}}
  if(!raw){try{const s=localStorage.getItem(CK); if(s) raw=JSON.parse(s);}catch(e){}}
  if(!raw) return null;
  if(Array.isArray(raw)) return {people:raw,mode:'animal'}; // 旧形式
  return raw;
}

/* =========================================================
   モード
   ========================================================= */
let curMode='animal', lastPeople=null;
const bAnimal=document.getElementById('mAnimal'), bBazi=document.getElementById('mBazi');
function setMode(mode){
  curMode=mode;
  bAnimal.classList.toggle('on',mode==='animal');
  bBazi.classList.toggle('on',mode==='bazi');
  document.getElementById('resTitle').textContent = mode==='animal'?'診断結果':'命式・鑑定結果';
  document.getElementById('note').textContent = mode==='animal'
    ? '※ 生年月日の干支（60日周期）にもとづく動物占い。最後に占った内容はこの端末に保存されます。'
    : '※ 出生時刻を使わない三柱（年・月・日）の四柱推命。月柱・年柱は節気（立春など）で計算しています。';
  if(lastPeople){ save({people:lastPeople,mode:curMode}); render(); }
}
bAnimal.onclick=()=>setMode('animal');
bBazi.onclick=()=>setMode('bazi');

/* =========================================================
   描画
   ========================================================= */
function render(){ curMode==='animal'?renderAnimal():renderBazi(); }

function renderAnimal(){
  const rc=document.getElementById('rcards'); rc.innerHTML='';
  lastPeople.forEach((p,i)=>{
    const no=charNo(p.y,p.m,p.d), row=C[no-1], name=row[1], animal=row[2], summary=row[3], a=A[animal], g=G[a.g];
    const b=bazi(p.y,p.m,p.d); // 四柱推命との対応（日柱）
    const who=p.name||('メンバー'+(i+1));
    const card=document.createElement('div'); card.className='rcard';
    card.innerHTML=`
      <div class="top" style="background:linear-gradient(135deg,${g.c1},${g.c2})">
        <div class="emoji">${a.e}</div>
        <div class="meta">
          <div class="pname">${esc(who)}（${p.y}/${p.m}/${p.d}）</div>
          <div class="cname">${name}</div>
          <div class="sub"><span class="pill">キャラNo.${no}</span><span class="pill">${animal} ${a.e}</span><span class="pill">${g.emoji}${g.name.replace('グループ','')}</span><span class="pill">☯ 日柱 ${b.day}</span></div>
        </div>
        <div class="chev">▾</div>
      </div>
      <div class="detail">
        <div class="lbl">キャラクター</div><p>${summary}</p>
        <div class="lbl">${g.emoji} ${g.name}の傾向</div><p>${g.desc}</p>
        <div class="lbl">キーワード</div><p>${a.k.map(k=>'#'+k).join('　')}</p>
        <div class="lbl">四柱推命との対応</div><p>この動物キャラは、生まれた日の干支＝<b>日柱「${b.day}」</b>（日主：${PERSON[b.dsi].n}）に対応します。「☯ 四柱推命」モードで詳しく見られます。</p>
      </div>`;
    card.querySelector('.top').onclick=()=>card.classList.toggle('open');
    rc.appendChild(card);
  });
  document.getElementById('extra').innerHTML=`
    <div class="compat"><h4>👨‍👩‍👧‍👦 家族の相性診断</h4>
      <div class="ph"><p>動物占いの相性は組み合わせデータの登録後に実装予定です。<br>いますぐ相性を見たい場合は「☯ 四柱推命」モードでご覧いただけます。</p><span class="soon">準備中</span></div>
    </div>`;
}

function renderBazi(){
  const rc=document.getElementById('rcards'); rc.innerHTML='';
  const bs=lastPeople.map(p=>bazi(p.y,p.m,p.d));
  lastPeople.forEach((p,i)=>{
    const b=bs[i], who=p.name||('メンバー'+(i+1));
    const dEl=stemElem(b.dsi), hcol=GCOL[dEl];
    const per=PERSON[b.dsi];
    // 通変星（年干・月干）
    const De=stemElem(b.dsi),Dy=stemYang(b.dsi);
    const gYear=tenGod(De,Dy,stemElem(b.ysi),stemYang(b.ysi));
    const gMonth=tenGod(De,Dy,stemElem(b.msi),stemYang(b.msi));
    const pil=(lbl,si,bi,god)=>`
      <div class="pillar"><div class="plbl">${lbl}</div>
        <div class="gan" style="color:${GCOL[stemElem(si)]}">${STEMS[si]}</div>
        <div class="shi" style="color:${GCOL[brElem[bi]]}">${BR[bi]}</div>
        <div class="god">${god}</div></div>`;
    const cnt=gogyoCount(b), mx=Math.max(...cnt,1);
    const bars=cnt.map((v,gi)=>`<div class="grow"><div class="gl" style="color:${GCOL[gi]}">${GNAME[gi]}</div><div class="bar"><i style="width:${Math.round(v/mx*100)}%;background:${GCOL[gi]}"></i></div><div class="gv">${v}</div></div>`).join('');
    const no=charNo(p.y,p.m,p.d), arow=C[no-1], aInfo=A[arow[2]]; // 動物占いとの対応
    const card=document.createElement('div'); card.className='bcard';
    card.innerHTML=`
      <div class="btop" style="background:linear-gradient(135deg,${hcol},${shade(hcol)})">
        <div class="bpname">${esc(who)}（${p.y}/${p.m}/${p.d}）</div>
        <div class="bmain">日主：${per.n}</div>
        <div class="bsub">${per.s}${b.py!==p.y?'　※立春前のため年柱は'+b.py+'年基準':''}</div>
      </div>
      <div class="binner">
        <div class="meishiki">
          ${pil('年柱',b.ysi,b.ybi,TG[gYear]?gYear+'／'+TG[gYear]:gYear)}
          ${pil('月柱',b.msi,b.mbi,TG[gMonth]?gMonth+'／'+TG[gMonth]:gMonth)}
          ${pil('日柱',b.dsi,b.dbi,'日主（自分）')}
        </div>
        <div class="gogyo"><div class="glab">五行バランス</div>${bars}</div>
        <div class="perso"><div class="lbl">性格（日主）</div><p>${per.d}</p></div>
        <div class="perso"><div class="lbl">動物占いとの対応</div><p>日柱「${b.day}」は、動物占いの <b>No.${no} ${arow[1]} ${aInfo.e}</b> に対応します。「🐾 動物占い」モードで詳しく見られます。</p></div>
      </div>`;
    rc.appendChild(card);
  });
  // 家族の相性
  let ex='';
  if(lastPeople.length>=2){
    let pairs='';
    for(let i=0;i<lastPeople.length;i++) for(let j=i+1;j<lastPeople.length;j++){
      const c=compat(bs[i],bs[j]);
      const ni=lastPeople[i].name||('メンバー'+(i+1)), nj=lastPeople[j].name||('メンバー'+(j+1));
      pairs+=`<div class="cpair"><div class="ch"><div class="names">${esc(ni)} × ${esc(nj)}</div><div class="lab" style="color:${c.col}">${c.label}</div></div><div class="cn">${c.note}</div></div>`;
    }
    ex=`<div class="compat"><h4>👨‍👩‍👧‍👦 家族の相性診断</h4>${pairs}</div>`;
  }else{
    ex=`<div class="compat"><h4>👨‍👩‍👧‍👦 家族の相性診断</h4><div class="ph"><p>2人以上を入力すると、五行の相生・相剋と干支の合・冲から相性を自動計算します。</p></div></div>`;
  }
  document.getElementById('extra').innerHTML=ex;
}
function shade(hex){const n=parseInt(hex.slice(1),16);let r=Math.max(0,(n>>16)-30),g=Math.max(0,((n>>8)&255)-30),b=Math.max(0,(n&255)-30);return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}

/* =========================================================
   初期化・イベント
   ========================================================= */
const saved=load();
if(saved&&saved.people&&saved.people.length){ saved.people.forEach(makePerson); } else { makePerson(); }
if(saved&&saved.mode==='bazi'){ curMode='bazi'; bAnimal.classList.remove('on'); bBazi.classList.add('on'); }

document.getElementById('add').onclick=()=>{ makePerson(); peopleEl.lastChild.scrollIntoView({behavior:'smooth',block:'center'}); };
document.getElementById('go').onclick=()=>{
  const people=readPeople(), err=document.getElementById('err');
  if(people.some(p=>!(p.y&&p.m&&p.d))){err.style.display='block';return;}
  err.style.display='none';
  lastPeople=people; save({people,mode:curMode});
  setMode(curMode); // タイトル/note整合
  render();
  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
};
document.getElementById('again').onclick=()=>{ document.getElementById('results').classList.remove('show'); window.scrollTo({top:0,behavior:'smooth'}); };
</script>
