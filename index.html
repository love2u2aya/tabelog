<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>どうぶつ占い（個性学）60キャラ診断</title>
<style>
  :root{
    --bg:#f6f5f1; --card:#ffffff; --ink:#23201b; --sub:#6f695f;
    --line:#e7e3da; --accent:#c8a24b; --accent-ink:#7a5c14; --shadow:0 8px 30px rgba(0,0,0,.08);
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#1a1815; --card:#26231f; --ink:#f2ede3; --sub:#a9a293;
      --line:#3a352e; --accent:#d8b866; --accent-ink:#f0dca0; --shadow:0 10px 34px rgba(0,0,0,.45); }
  }
  :root[data-theme="light"]{
    --bg:#f6f5f1; --card:#ffffff; --ink:#23201b; --sub:#6f695f;
    --line:#e7e3da; --accent:#c8a24b; --accent-ink:#7a5c14; --shadow:0 8px 30px rgba(0,0,0,.08);
  }
  :root[data-theme="dark"]{
    --bg:#1a1815; --card:#26231f; --ink:#f2ede3; --sub:#a9a293;
    --line:#3a352e; --accent:#d8b866; --accent-ink:#f0dca0; --shadow:0 10px 34px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,-apple-system,sans-serif;
    line-height:1.7;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:640px;margin:0 auto;padding:32px 20px 64px;}
  header{text-align:center;margin-bottom:28px}
  h1{font-size:1.5rem;margin:0 0 6px;letter-spacing:.02em}
  .lead{color:var(--sub);font-size:.9rem;margin:0}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;
    box-shadow:var(--shadow);padding:24px;}
  .field{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
  label{font-size:.85rem;color:var(--sub);font-weight:600}
  input[type="date"]{font-size:1.05rem;padding:12px 14px;border-radius:12px;
    border:1px solid var(--line);background:var(--bg);color:var(--ink);width:100%;}
  button{width:100%;border:none;border-radius:12px;padding:14px;font-size:1.05rem;font-weight:700;
    background:var(--accent);color:#241c00;cursor:pointer;transition:filter .15s;letter-spacing:.04em}
  button:hover{filter:brightness(1.05)}
  .result{margin-top:22px}
  .badge-num{display:inline-flex;align-items:center;gap:8px;background:rgba(200,162,75,.15);
    color:var(--accent-ink);border:1px solid var(--accent);border-radius:999px;
    padding:5px 14px;font-weight:700;font-size:.85rem}
  .hero{display:flex;align-items:center;gap:16px;margin:16px 0}
  .emoji{font-size:3rem;line-height:1}
  .chara{font-size:1.35rem;font-weight:800;margin:0}
  .animal{color:var(--sub);font-size:.9rem;margin:2px 0 0}
  .desc{white-space:pre-wrap;border-top:1px solid var(--line);padding-top:16px;margin-top:8px}
  .pending{color:var(--sub);font-size:.9rem;background:rgba(120,120,120,.08);
    border:1px dashed var(--line);border-radius:12px;padding:14px}
  .note{font-size:.78rem;color:var(--sub);margin-top:26px;text-align:center;line-height:1.6}
  .hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>どうぶつ占い（個性学）診断</h1>
    <p class="lead">生年月日から 12動物・60キャラを判定します</p>
  </header>

  <div class="card">
    <div class="field">
      <label for="dob">生年月日</label>
      <input type="date" id="dob" min="1900-01-01" max="2100-12-31" value="1981-05-06">
    </div>
    <button id="go">診断する</button>

    <div id="result" class="result hidden"></div>
  </div>

  <p class="note">
    ※ 番号は日干支（60日周期）に基づき正確に算出しています。<br>
    ※「どうぶつ占い」「個性学」は権利者の商標です。キャラ名・解説文は公式の許諾テキストに差し替えて使用してください。
  </p>
</div>

<script>
/* ============================================================
   1〜60番号の算出（日干支＝60日周期の位置）
   検証: 1981-05-06 → 21（落ち着きのあるペガサス）
   ============================================================ */
function jdn(y, m, d){
  const a  = Math.floor((14 - m) / 12);
  const yy = y + 4800 - a;
  const mm = m + 12 * a - 3;
  return d + Math.floor((153 * mm + 2) / 5) + 365 * yy
       + Math.floor(yy / 4) - Math.floor(yy / 100) + Math.floor(yy / 400) - 32045;
}
function animalNumber(y, m, d){
  let n = ((jdn(y, m, d) % 60) + 50) % 60;   // オフセット50で公式番号に一致
  return n === 0 ? 60 : n;
}

/* ============================================================
   60キャラ換算データ（← ここに公式換算表を差し込む）
   形式: 番号: { chara:"キャラ名", animal:"12動物名", emoji:"絵文字", desc:"解説文" }
   ※現在は検証済みの #21 のみ登録。残りは公式データ待ち。
   ============================================================ */
const ANIMAL_EMOJI = {
  "狼":"🐺","こじか":"🦌","猿":"🐒","チータ":"🐆","黒ひょう":"🐆‍⬛",
  "ライオン":"🦁","虎":"🐯","たぬき":"🦝","子守熊":"🐨","ゾウ":"🐘",
  "ひつじ":"🐑","ペガサス":"🦄"
};
/* 12動物の一般的な傾向（当方作成の暫定文。公式の許諾テキストに差し替え可） */
const ANIMAL_DESC = {
  "狼":"独自のペースと世界観を大切にする一匹狼タイプ。干渉を嫌い、こだわりを貫く。",
  "こじか":"警戒心と甘えたい気持ちを併せ持つ、繊細でピュアなタイプ。",
  "猿":"好奇心旺盛で頭の回転が速く、その場を明るくする器用なタイプ。",
  "チータ":"目標に一直線。瞬発力と行動力で駆け抜ける情熱家タイプ。",
  "黒ひょう":"新しいもの好きでプライドが高く、面倒見のよいスマートなタイプ。",
  "ライオン":"堂々としたリーダー気質。頼られると力を発揮する自信家タイプ。",
  "虎":"おおらかで面倒見がよく、バランス感覚に優れた安定タイプ。",
  "たぬき":"経験を武器にする老練さと人当たりのよさを持つ、愛されタイプ。",
  "子守熊":"じっくり考え、こだわりを貫く、母性と粘り強さのタイプ。",
  "ゾウ":"努力家で完璧主義。まっすぐ突き進む頼れるタイプ。",
  "ひつじ":"協調性と情の深さを持ち、仲間思いで安心を求めるタイプ。",
  "ペガサス":"自由な発想と気まぐれな魅力を持つ、天才肌のタイプ。"
};
/* 60キャラ換算表（番号 → キャラ名 / 12動物） */
const DB = {
  1:{chara:"長距離ランナーのチータ",animal:"チータ"},
  2:{chara:"社交家のたぬき",animal:"たぬき"},
  3:{chara:"落ち着きのない猿",animal:"猿"},
  4:{chara:"フットワークの軽い子守熊",animal:"子守熊"},
  5:{chara:"面倒見のいい黒ひょう",animal:"黒ひょう"},
  6:{chara:"愛情あふれる虎",animal:"虎"},
  7:{chara:"全力疾走するチータ",animal:"チータ"},
  8:{chara:"磨き上げられたたぬき",animal:"たぬき"},
  9:{chara:"大きな志をもった猿",animal:"猿"},
  10:{chara:"母性豊かな子守熊",animal:"子守熊"},
  11:{chara:"正直なこじか",animal:"こじか"},
  12:{chara:"人気者のゾウ",animal:"ゾウ"},
  13:{chara:"ネアカの狼",animal:"狼"},
  14:{chara:"協調性のないひつじ",animal:"ひつじ"},
  15:{chara:"どっしりとした猿",animal:"猿"},
  16:{chara:"コアラのなかの子守熊",animal:"子守熊"},
  17:{chara:"強い意志をもったこじか",animal:"こじか"},
  18:{chara:"デリケートなゾウ",animal:"ゾウ"},
  19:{chara:"放浪の狼",animal:"狼"},
  20:{chara:"物静かなひつじ",animal:"ひつじ"},
  21:{chara:"落ち着きのあるペガサス",animal:"ペガサス"},
  22:{chara:"強靭な翼をもつペガサス",animal:"ペガサス"},
  23:{chara:"無邪気なひつじ",animal:"ひつじ"},
  24:{chara:"クリエイティブな狼",animal:"狼"},
  25:{chara:"穏やかな狼",animal:"狼"},
  26:{chara:"粘り強いひつじ",animal:"ひつじ"},
  27:{chara:"波乱に満ちたペガサス",animal:"ペガサス"},
  28:{chara:"優雅なペガサス",animal:"ペガサス"},
  29:{chara:"チャレンジ精神旺盛なひつじ",animal:"ひつじ"},
  30:{chara:"順応性のある狼",animal:"狼"},
  31:{chara:"リーダーとなるゾウ",animal:"ゾウ"},
  32:{chara:"しっかり者のこじか",animal:"こじか"},
  33:{chara:"活動的な子守熊",animal:"子守熊"},
  34:{chara:"気分屋の猿",animal:"猿"},
  35:{chara:"頼られると嬉しいひつじ",animal:"ひつじ"},
  36:{chara:"好感のもたれる狼",animal:"狼"},
  37:{chara:"まっしぐらに突き進むゾウ",animal:"ゾウ"},
  38:{chara:"華やかなこじか",animal:"こじか"},
  39:{chara:"夢とロマンの子守熊",animal:"子守熊"},
  40:{chara:"尽くす猿",animal:"猿"},

  44:{chara:"情熱的な黒ひょう",animal:"黒ひょう"},
  45:{chara:"サービス精神旺盛な子守熊",animal:"子守熊"},
  46:{chara:"守りの猿",animal:"猿"},

  49:{chara:"ゆったりとした悠然の虎",animal:"虎"},
  50:{chara:"落ち込みの激しい黒ひょう",animal:"黒ひょう"},
  51:{chara:"我が道を行くライオン",animal:"ライオン"},
  52:{chara:"統率力のあるライオン",animal:"ライオン"},

  57:{chara:"感情的なライオン",animal:"ライオン"},
  58:{chara:"傷つきやすいライオン",animal:"ライオン"},
  59:{chara:"束縛を嫌う黒ひょう",animal:"黒ひょう"},
  60:{chara:"慈悲深い虎",animal:"虎"}
};

function render(y, m, d){
  const num = animalNumber(y, m, d);
  const box = document.getElementById('result');
  const rec = DB[num];
  const emoji = ANIMAL_EMOJI[rec.animal] || "🐾";
  const blurb = ANIMAL_DESC[rec.animal] || "";

  box.innerHTML = `
    <span class="badge-num">キャラ番号 <b>${num}</b> / 60</span>
    <div class="hero">
      <div class="emoji">${emoji}</div>
      <div>
        <p class="chara">${rec.chara}</p>
        <p class="animal">動物：${rec.animal}</p>
      </div>
    </div>
    <div class="desc">${blurb}<br><span style="color:var(--sub);font-size:.8rem">※個別の詳しい解説は、公式の許諾テキストに差し替えてご利用ください。</span></div>`;
  box.classList.remove('hidden');
}

document.getElementById('go').addEventListener('click', () => {
  const v = document.getElementById('dob').value;
  if (!v) return;
  const [y, m, d] = v.split('-').map(Number);
  render(y, m, d);
});
// 初期表示
document.getElementById('go').click();
</script>
</body>
</html>
