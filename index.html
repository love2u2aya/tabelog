</style>

function solarLong(jd){
  const T=(jd-2451545)/36525;
  const L0=280.46646+36000.76983*T+0.0003032*T*T;
  const M=357.52911+35999.05029*T-0.0001537*T*T, Mr=M*Math.PI/180;
  const Cc=(1.914602-0.004817*T-0.000014*T*T)*Math.sin(Mr)+(0.019993-0.000101*T)*Math.sin(2*Mr)+0.000289*Math.sin(3*Mr);
  const om=125.04-1934.136*T;
  let l=L0+Cc-0.00569-0.00478*Math.sin(om*Math.PI/180);
  return ((l%360)+360)%360;
}

const ZOKAN=[[9],[5,9,7],[0,2,4],[1],[4,1,9],[2,6,4],[3,5],[5,3,1],[6,8,4],[7],[4,7,3],[8,0]];

function kubou(dg){const j=Math.floor(dg/10),a=((j*10)+10)%12,b=((j*10)+11)%12;return [a,b];}
function mbOfDate(y,m,d){return Math.floor(((((solarLong(toJDN(y,m,d)-0.375)-315)%360)+360)%360)/30);} // 0=寅
function bazi(y,m,d,hh){
  const lam=solarLong(toJDN(y,m,d)-0.375); // 12:00 JST
  const mb=Math.floor(((((lam-315)%360)+360)%360)/30); // 0=寅
  const monthOrder=mb+1;
  let py=y; if(m<=2 && lam<315) py=y-1;
  const ysi=((py-4)%10+10)%10, ybi=((py-4)%12+12)%12;
  const tiger=(2+2*(ysi%5))%10;
  const msi=(tiger+(monthOrder-1))%10;
  const mbi=(monthOrder+1)%12;
  const dg=(((toJDN(y,m,d)+49)%60)+60)%60; // 0=甲子
  const dsi=dg%10, dbi=dg%12;
  const o={py, ysi,ybi, msi,mbi, dsi,dbi, dg,
    year:STEMS[ysi]+BR[ybi], month:STEMS[msi]+BR[mbi], day:STEMS[dsi]+BR[dbi],
    stems:[ysi,msi,dsi], branches:[ybi,mbi,dbi], labels:['年柱','月柱','日柱']};
  if(hh!==null&&hh!==undefined){ // 時柱（入力があれば稼働）
    const hbi=Math.floor((hh+1)/2)%12;          // 時支
    const ziStem=((dsi%5)*2)%10;                // 五鼠遁：子刻の干
    const hsi=(ziStem+hbi)%10;                  // 時干
    o.hsi=hsi; o.hbi=hbi; o.hour=STEMS[hsi]+BR[hbi];
    o.stems.push(hsi); o.branches.push(hbi); o.labels.push('時柱');
  }
  return o;
}
// 五行バランス（天干＋各地支の蔵干をすべて集計）
function gogyoCount(b){
  const c=[0,0,0,0,0];
  b.stems.forEach(s=>c[stemElem(s)]++);
  b.branches.forEach(br=>ZOKAN[br].forEach(z=>c[stemElem(z)]++));
  return c;
}

function strength(dsi,c){
  const de=stemElem(dsi), support=c[de]+c[(de+4)%5], tot=c.reduce((a,b)=>a+b,0);
  return {support,tot,label:support*2>=tot?'身強':'身弱',
    desc:support*2>=tot?'味方の五行が多め。自分の意志で切り開くパワータイプ。':'味方の五行が少なめ。周囲と協調し、環境を活かすと伸びるタイプ。'};
}
// 大運（10年ごとの運）
function daiun(y,m,d,ysi,msi,mbi,male){
  const forward=(stemYang(ysi)===male);
  const bmb=mbOfDate(y,m,d), step=forward?1:-1;
  let days=0,cy=y,cm=m,cd=d;
  for(let k=0;k<40;k++){const dt=new Date(Date.UTC(cy,cm-1,cd));dt.setUTCDate(dt.getUTCDate()+step);cy=dt.getUTCFullYear();cm=dt.getUTCMonth()+1;cd=dt.getUTCDate();days++;if(mbOfDate(cy,cm,cd)!==bmb)break;}
  const startAge=Math.max(1,Math.round((forward?days:days-1)/3));
  let mIdx=-1; for(let k=0;k<60;k++) if(k%10===msi&&k%12===mbi){mIdx=k;break;}
  const list=[];
  for(let n=0;n<8;n++){const idx=((mIdx+(forward?(n+1):-(n+1)))%60+60)%60;list.push({age:startAge+n*10,si:idx%10,bi:idx%12});}
  return {forward,startAge,list};
}

const pairHas=(l,a,b)=>l.some(p=>(p[0]===a&&p[1]===b)||(p[0]===b&&p[1]===a));
function compat(ba,bb){
  const ea=stemElem(ba.dsi), eb=stemElem(bb.dsi);
  const na=ba.dbi, nb=bb.dbi;
  let s=0; const notes=[];
  if(ea===eb){s+=1;notes.push('日主が同じ五行（'+GNAME[ea]+'）で価値観が似ています。');}
  else if(ea===(eb+1)%5||eb===(ea+1)%5){s+=2;notes.push('日主の五行が相生（'+GNAME[ea]+'と'+GNAME[eb]+'）。自然に助け合える良い関係です。');}
  else if(ea===(eb+2)%5||eb===(ea+2)%5){s-=1;notes.push('日主の五行が相剋（'+GNAME[ea]+'と'+GNAME[eb]+'）。刺激的ですが衝突にも注意。');}
  else{notes.push('日主の五行はほどよい距離感（'+GNAME[ea]+'と'+GNAME[eb]+'）です。');}
  if(pairHas(HE,na,nb)){s+=2;notes.push('日支が支合（'+BR[na]+BR[nb]+'）で惹かれ合う相性。');}
  else if(pairHas(CHONG,na,nb)){s-=2;notes.push('日支が冲（'+BR[na]+BR[nb]+'）でぶつかりやすい面も。');}
  const label=s>=3?'◎ 相性抜群':s>=1?'○ 良い相性':s===0?'△ ふつう':'▲ 要歩み寄り';
  const col=s>=3?'#2f8f63':s>=1?'#4caf7d':s===0?'#b0902f':'#c96a4f';
  return {label,col,note:notes.join('')};
}

const CK="doubutsu_family";
function save(state){
  const v=encodeURIComponent(JSON.stringify(state));
  try{document.cookie=CK+"="+v+";max-age="+(60*60*24*365)+";path=/;samesite=lax";}catch(e){}
  try{localStorage.setItem(CK,JSON.stringify(state));}catch(e){}
}
function load(){
  let raw=null;
  const m=document.cookie.match(/(?:^|; )doubutsu_family=([^;]*)/);
  if(m){try{raw=JSON.parse(decodeURIComponent(m[1]));}catch(e){}}
  if(!raw){try{const s=localStorage.getItem(CK); if(s) raw=JSON.parse(s);}catch(e){}}
  if(!raw) return null;
  if(Array.isArray(raw)) return {people:raw,mode:'animal'}; // 旧形式
  return raw;
}

    const who=p.name||('メンバー'+(i+1));
    const card=document.createElement('div'); card.className='rcard';
    card.innerHTML=`
      <div class="top" style="background:linear-gradient(135deg,${g.c1},${g.c2})">
        <div class="emoji">${a.e}</div>
        <div class="meta">
          <div class="pname">${esc(who)}（${p.y}/${p.m}/${p.d}）</div>
          <div class="cname">${name}</div>
          <div class="sub"><span class="pill">キャラNo.${no}</span><span class="pill">${animal} ${a.e}</span><span class="pill">${g.emoji}${g.name.replace('グループ','')}</span><span class="pill">☯ 日柱 ${b.day}</span></div>
        </div>
        <div class="chev">▾</div>
      </div>
      <div class="detail">
        <div class="lbl">キャラクター</div><p>${summary}</p>
        <div class="lbl">${g.emoji} ${g.name}の傾向</div><p>${g.desc}</p>
        <div class="lbl">キーワード</div><p>${a.k.map(k=>'#'+k).join('　')}</p>
        <div class="lbl">四柱推命との対応</div><p>この動物キャラは、生まれた日の干支＝<b>日柱「${b.day}」</b>（日主：${PERSON[b.dsi].n}）に対応します。「☯ 四柱推命」モードで詳しく見られます。</p>
      </div>`;
    card.querySelector('.top').onclick=()=>card.classList.toggle('open');
    rc.appendChild(card);
  });
  document.getElementById('extra').innerHTML=`
    <div class="compat"><h4>👨‍👩‍👧‍👦 家族の相性診断</h4>
      <div class="ph"><p>動物占いの相性は組み合わせデータの登録後に実装予定です。<br>いますぐ相性を見たいときは、四柱推命モードでご覧いただけます。</p>
        <button class="tolink" id="toBazi">☯ 四柱推命モードで相性を見る →</button>
        <div style="margin-top:10px"><span class="soon">動物占いの相性は準備中</span></div>
      </div>
    </div>`;
  const tb=document.getElementById('toBazi');
  if(tb) tb.onclick=()=>setMode('bazi');
}

function renderBazi(){
  const rc=document.getElementById('rcards'); rc.innerHTML='';
  const bs=lastPeople.map(p=>bazi(p.y,p.m,p.d,p.hh));
  const NOWD=new Date();
  const ry=NOWD.getFullYear(),rm=NOWD.getMonth()+1,rd=NOWD.getDate();
  const rb=bazi(ry,rm,rd); // 今年の流年
  lastPeople.forEach((p,i)=>{
    const b=bs[i], who=p.name||('メンバー'+(i+1));
    const dEl=stemElem(b.dsi), hcol=GCOL[dEl];
    const per=PERSON[b.dsi];
    const De=stemElem(b.dsi),Dy=stemYang(b.dsi);
    const tg=(si)=>tenGod(De,Dy,stemElem(si),stemYang(si));
    // 命式ピラー（蔵干・十二運つき）
    const pil=(lbl,si,bi,god)=>{
      const zk=ZOKAN[bi].map(z=>STEMS[z]).join('');
      const jn=juuni(b.dsi,bi);
      const godTip=TG[god]?`通変星「${god}」：${TG[god]}`:(god==='日主'?TERMTIP['日主']:'');
      return `<div class="pillar"><div class="plbl">${lbl}</div>
        <div class="gan" style="color:${GCOL[stemElem(si)]}">${STEMS[si]}</div>
        <div class="shi" style="color:${GCOL[brElem[bi]]}">${BR[bi]}</div>
        <div class="god"${dt(godTip)}>${god}</div>
        <div class="zk"${dt(TERMTIP['蔵干'])}>蔵干 ${zk}</div>
        <div class="zk"${dt('十二運「'+jn+'」：'+JUUNIMEAN[jn])}>${jn}</div></div>`;
    };
    let pillars=pil('年柱',b.ysi,b.ybi,tg(b.ysi))
               +pil('月柱',b.msi,b.mbi,tg(b.msi))
               +pil('日柱',b.dsi,b.dbi,'日主');
    if(b.hour!==undefined) pillars+=pil('時柱',b.hsi,b.hbi,tg(b.hsi));
    const cnt=gogyoCount(b), mx=Math.max(...cnt,1);
    const bars=cnt.map((v,gi)=>`<div class="grow"><div class="gl" style="color:${GCOL[gi]}"${dt('五行「'+GNAME[gi]+'」：'+GMEAN[gi])}>${GNAME[gi]}</div><div class="bar"><i style="width:${Math.round(v/mx*100)}%;background:${GCOL[gi]}"></i></div><div class="gv">${v}</div><div class="gk">${GMEAN[gi]}</div></div>`).join('');
    const st=strength(b.dsi,cnt);
    const kb=kubou(b.dg); const kbTxt=BR[kb[0]]+BR[kb[1]];
    const ryG=tg(rb.ysi); // 流年の通変星（今年の年干を日主から見る）
    // 大運
    const male=(p.sex||'M')==='M';
    const du=daiun(p.y,p.m,p.d,b.ysi,b.msi,b.mbi,male);
    const age=ry-p.y; // 現在のおおよその満年齢
    let curDu=null;
    const duCells=du.list.map(x=>{
      const end=x.age+9, now=(age>=x.age&&age<=end);
      if(now) curDu={x,end,god:tg(x.si)};
      return `<div class="ducell${now?' now':''}"><div class="da">${x.age}〜${end}歳</div><div class="dg" style="color:${GCOL[stemElem(x.si)]}">${STEMS[x.si]}${BR[x.bi]}</div><div class="dt">${tg(x.si)}</div>${now?'<div class="nowb">今ここ</div>':''}</div>`;
    }).join('');
    // 今の大運の意味コメント
    let duNow='';
    if(curDu){
      duNow=`<div class="dunow">▶ 今の大運（${curDu.x.age}〜${curDu.end}歳・${STEMS[curDu.x.si]}${BR[curDu.x.bi]}／<b>${curDu.god}</b>）：${DAIUN_THEME[curDu.god]}</div>`;
    }else if(age<du.startAge){
      duNow=`<div class="dunow">▶ 大運入りは${du.startAge}歳から。それまでは月柱（${b.month}）の影響が中心の時期です。</div>`;
    }
    // 総合コメント（日主・五行の偏り・身強弱・月柱の通変星）
    let dom=0; cnt.forEach((v,gi)=>{if(v>cnt[dom])dom=gi;});
    const monthGod=tg(b.msi);
    const summary=`${esc(who)}さんの軸は<b>日主「${per.n}」</b>。${per.d} 五行では<b>${GNAME[dom]}（${GMEAN[dom]}）</b>が最も強く、日主の強さは<b>${st.label}</b>で${st.desc} 社会性を表す月柱の通変星は<b>${monthGod}（${TG[monthGod]}）</b>です。`;
    const no=charNo(p.y,p.m,p.d), arow=C[no-1], aInfo=A[arow[2]];
    const timeNote=b.hour===undefined?'　※時刻未入力のため三柱':'';
    const card=document.createElement('div'); card.className='bcard';
    card.innerHTML=`
      <div class="btop" style="background:linear-gradient(135deg,${hcol},${shade(hcol)})">
        <div class="bpname">${esc(who)}（${p.y}/${p.m}/${p.d}${b.hour!==undefined?' '+p.hh+'時台':''}・${male?'男性':'女性'}）</div>
        <div class="bmain"><span${dt(TERMTIP['日主'])}>日主</span>：${per.n}</div>
        <div class="bsub">${per.s}${b.py!==p.y?'　※立春前のため年柱は'+b.py+'年基準':''}${timeNote}</div>
      </div>
      <div class="binner">
        <div class="summary"><div class="lbl">🔮 総合コメント</div><p>${summary}</p></div>
        <div class="meishiki">${pillars}</div>
        <div class="tags">
          <span class="tag" style="border-color:${st.label==='身強'?'#e08a3c':'#5a8fd6'};color:${st.label==='身強'?'#c96a1f':'#3f6fb0'}"${dt(TERMTIP[st.label])}>${st.label}</span>
          <span class="tag"${dt(TERMTIP['空亡'])}>空亡：${kbTxt}</span>
          <span class="tag"${dt(TERMTIP['流年'])}>今年(${rb.year})：${ryG}</span>
        </div>
        <div class="gogyo"><div class="glab">五行バランス（蔵干含む）</div>${bars}</div>
        <div class="perso"><div class="lbl">性格（日主）</div><p>${per.d}</p></div>
        <div class="perso"><div class="lbl">身強・身弱</div><p><b>${st.label}</b>：${st.desc}</p></div>
        <div class="daiun"><div class="lbl"${dt(TERMTIP['大運'])}>大運（だいうん）＝10年ごとに巡る運の流れ・${du.forward?'順行':'逆行'}／${du.startAge}歳スタート</div>
          <div class="durow">${duCells}</div>${duNow}</div>
        <div class="perso"><div class="lbl">動物占いとの対応</div><p>日柱「${b.day}」は、動物占いの <b>No.${no} ${arow[1]} ${aInfo.e}</b> に対応します。「🐾 動物占い」モードで詳しく見られます。</p></div>
      </div>`;
    rc.appendChild(card);
  });
  // 家族の相性
  let ex='';
  if(lastPeople.length>=2){
    let pairs='';
    for(let i=0;i<lastPeople.length;i++) for(let j=i+1;j<lastPeople.length;j++){
      const c=compat(bs[i],bs[j]);
      const ni=lastPeople[i].name||('メンバー'+(i+1)), nj=lastPeople[j].name||('メンバー'+(j+1));
      pairs+=`<div class="cpair"><div class="ch"><div class="names">${esc(ni)} × ${esc(nj)}</div><div class="lab" style="color:${c.col}">${c.label}</div></div><div class="cn">${c.note}</div></div>`;
    }
    ex=`<div class="compat"><h4>👨‍👩‍👧‍👦 家族の相性診断</h4>${pairs}</div>`;
  }else{
    ex=`<div class="compat"><h4>👨‍👩‍👧‍👦 家族の相性診断</h4><div class="ph"><p>2人以上を入力すると、五行の相生・相剋と干支の合・冲から相性を自動計算します。</p></div></div>`;
  }
  document.getElementById('extra').innerHTML=ex+glossaryHTML();
}
function glossaryHTML(){
  const gogyoRows=GNAME.map((g,i)=>`<div class="grow"><div class="gl" style="color:${GCOL[i]}">${g}</div><div class="gk" style="flex:1;text-align:left">${GMEAN[i]}</div></div>`).join('');
  const tsuhen=Object.keys(TG).map(k=>`<li><b>${k}</b>：${TG[k]}</li>`).join('');
  const juuni=STAGES.map(s=>`<li><b>${s}</b>：${JUUNIMEAN[s]}</li>`).join('');
  return `
    <details class="glossary">
      <summary>☯ 用語の意味（タップで開く）</summary>
      <div class="gbody">
        <div class="gsec"><h5>五行（ごぎょう）</h5><p>世界を5つの要素で捉える考え方。バランスで性質を読みます。</p>${gogyoRows}</div>
        <div class="gsec"><h5>日主（にっしゅ）</h5><p>日柱の天干。四柱推命でいちばん大切な「あなた自身」を表す軸です。</p></div>
        <div class="gsec"><h5>身強・身弱（みきょう・みじゃく）</h5><p>日主を支える五行が多いか少ないか。<b>身強</b>＝自分の力で進むパワー型、<b>身弱</b>＝周囲を活かす協調型（優劣ではなく傾向）。</p></div>
        <div class="gsec"><h5>通変星（つうへんせい）＝十神</h5><p>日主から見た関係で、性格・才能の方向性を表す10種。</p><ul>${tsuhen}</ul></div>
        <div class="gsec"><h5>十二運星（じゅうにうんせい）</h5><p>その柱のエネルギーの段階を、人の一生になぞらえた12種。</p><ul>${juuni}</ul></div>
        <div class="gsec"><h5>蔵干（ぞうかん）</h5><p>地支の中に隠れた天干。表に出ない才能や本音を表します。</p></div>
        <div class="gsec"><h5>空亡（くうぼう）＝天中殺</h5><p>物事が実りにくい「充電期間」。焦らず種まきに向く時期・分野とされます。</p></div>
        <div class="gsec"><h5>大運（だいうん）</h5><p>10年ごとに巡ってくる運の大きな流れ。生まれた時刻ではなく生月と性別から算出します。</p></div>
        <div class="gsec"><h5>流年（りゅうねん）</h5><p>その年ごとの運。今年の干支を日主から見た通変星で傾向を読みます。</p></div>
      </div>
    </details>`;
}
function shade(hex){const n=parseInt(hex.slice(1),16);let r=Math.max(0,(n>>16)-30),g=Math.max(0,((n>>8)&255)-30),b=Math.max(0,(n&255)-30);return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}

/* =========================================================
   初期化・イベント
   ========================================================= */
const saved=load();
if(saved&&saved.people&&saved.people.length){ saved.people.forEach(makePerson); } else { makePerson(); }
if(saved&&saved.mode==='bazi'){ curMode='bazi'; bAnimal.classList.remove('on'); bBazi.classList.add('on'); }

document.getElementById('add').onclick=()=>{ makePerson(); peopleEl.lastChild.scrollIntoView({behavior:'smooth',block:'center'}); };
document.getElementById('go').onclick=()=>{
  const people=readPeople(), err=document.getElementById('err');
  if(people.some(p=>!(p.y&&p.m&&p.d))){err.style.display='block';return;}
  err.style.display='none';
  lastPeople=people; save({people,mode:curMode});
  setMode(curMode); // タイトル/note整合
  render();
  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
};
document.getElementById('again').onclick=()=>{ document.getElementById('results').classList.remove('show'); window.scrollTo({top:0,behavior:'smooth'}); };

/* 用語ツールチップ（カーソルから少し離して表示） */
(function(){
  const tip=document.createElement('div'); tip.id='tip'; document.body.appendChild(tip);
  let on=false;
  const OFX=18, OFY=22; // カーソルからの距離
  function place(e){
    const w=tip.offsetWidth, h=tip.offsetHeight;
    let x=e.clientX+OFX, y=e.clientY+OFY;
    if(x+w>innerWidth-8) x=e.clientX-w-OFX;
    if(y+h>innerHeight-8) y=e.clientY-h-OFY;
    if(x<8) x=8; if(y<8) y=8;
    tip.style.left=x+'px'; tip.style.top=y+'px';
  }
  document.addEventListener('mouseover',e=>{
    const t=e.target.closest('[data-tip]'); if(!t) return;
    tip.textContent=t.getAttribute('data-tip'); tip.classList.add('on'); on=true; place(e);
  });
  document.addEventListener('mousemove',e=>{ if(on) place(e); });
  document.addEventListener('mouseout',e=>{
    const t=e.target.closest('[data-tip]'); if(t){ tip.classList.remove('on'); on=false; }
  });
})();
</script>
